[project]
authors = [
  { name = "jesse", email = "jesse@dgi.com" },
]
requires-python = ">=3.7,<4.0"
dependencies = [
  "typing-extensions>=4.0.0",
]
name = "xtyping"
version = "0.6.3"
description = "xtyping = typing + typing_extensions"
readme = "README.md"
classifiers = [
  "Development Status :: 5 - Production/Stable",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: MIT License",
  "Programming Language :: Python",
  "Programming Language :: Python :: 3.7",
  "Programming Language :: Python :: 3.8",
  "Programming Language :: Python :: 3.9",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Typing :: Typed",
]
keywords = [
  "typing",
  "dgpy",
  "typed",
  "types",
]
license = { text = "MIT" }

[project.urls]
homepage = "https://github.com/dynamic-graphics-inc/dgpy-libs/tree/main/libs/xtyping"
repository = "https://github.com/dynamic-graphics-inc/dgpy-libs"

[tool.poetry]
name = "xtyping"
version = "0.6.3"
description = "xtyping = typing + typing_extensions"
license = "MIT"
authors = ["jesse <jesse@dgi.com>"]
repository = "https://github.com/dynamic-graphics-inc/dgpy-libs"
homepage = "https://github.com/dynamic-graphics-inc/dgpy-libs/tree/main/libs/xtyping"
readme = 'README.md'
packages = [{ include = "xtyping", from = "." }]
classifiers = [
  "Development Status :: 5 - Production/Stable",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: MIT License",
  "Programming Language :: Python",
  "Programming Language :: Python :: 3.7",
  "Programming Language :: Python :: 3.8",
  "Programming Language :: Python :: 3.9",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Typing :: Typed",
]
keywords = ["typing", "dgpy", "typed", "types"]

[tool.poetry.dependencies]
python = "^3.7"
typing-extensions = ">=4.0.0"

[tool.poetry.dev-dependencies]
pytest = "^7.3.1"

[tool.pdm]
[tool.pdm.dev-dependencies]
dev = [
  "pytest<8.0.0,>=7.3.1",
]

[tool.pdm.build]
includes = ["./xtyping"]
[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.coverage.run]
source = ['xtyping']
branch = true
context = '${CONTEXT}'
omit = ["**/__main__.py"]

[tool.coverage.report]
precision = 2
show_missing = true
exclude_lines = [
  'pragma: nocov',
  'pragma: no cover',
  'raise NotImplementedError',
  'if TYPE_CHECKING:',
  '@overload',
  '\(Protocol\):$',
  'if 0:',
  'if False:',
]

[tool.ruff]
extend = "../../pyproject.toml"
