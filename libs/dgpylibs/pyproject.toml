[tool.ruff]
extend = "../../pyproject.toml"

[project]
authors = [
  { name = "jessekrubin", email = "jesse@dgi.com" },
]
requires-python = ">=3.8,<4.0"
dependencies = [
  "aiopen",
  "asyncify",
  "fmts",
  "funkify",
  "h5>=0.8.8",
  "jsonbourne",
  "lager>=0.17.1",
  "listless",
  "requires",
  "shellfish",
  "xtyping",
]
name = "dgpylibs"
version = "0.0.6"
description = "Dynamic Graphics Python libraries"
classifiers = [
  "Development Status :: 5 - Production/Stable",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: MIT License",
  "Programming Language :: Python",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.8",
  "Programming Language :: Python :: 3.9",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Typing :: Typed",
]
keywords = [
  "dgpy",
  "dgi",
  "typed",
  "python3",
]
license = { text = "MIT" }

[project.urls]
homepage = "https://github.com/dynamic-graphics-inc/dgpy-libs"
repository = "https://github.com/dynamic-graphics-inc/dgpy-libs"

[project.optional-dependencies]
test = [
  "dgpytest<0.0.3,>=0.0.1",
]
